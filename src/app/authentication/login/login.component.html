<div
  class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">

  <div
    class="w-full max-w-[1200px] min-h-[700px] bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-2xl flex flex-col md:flex-row">

    <!-- Left Sidebar -->
    <div
      class="w-full md:w-2/5 bg-gradient-to-br from-slate-900 via-[#1e293b] to-slate-900 p-8 md:p-12 flex flex-col justify-between relative overflow-hidden">

      <div class="relative z-10">
        <div class="flex items-center gap-3 mb-12">
          <div class="bg-primary p-2 rounded-lg text-white">
            <img src="/logo.png" class="text-3xl" alt="logo">
          </div>
          <h1 class="text-white text-2xl font-bold tracking-tight">MedGyan</h1>
        </div>

        <div class="mt-20">
          <h2 class="text-white text-4xl font-bold leading-tight mb-4">
            Admin Control Panel
          </h2>
          <p class="text-slate-400 text-lg max-w-xs">
            Manage students, trial access, and institutional approvals with ease.
          </p>
        </div>
      </div>

      <div class="relative z-10 mt-auto pt-10 border-t border-slate-700/50">
        <div class="flex items-center gap-4 text-slate-300">
          <div class="flex -space-x-2">
            <div class="size-8 rounded-full border-2 border-slate-800 bg-slate-700">
              <img src="/favicon.ico" alt="">
            </div>
            <div class="size-8 rounded-full border-2 border-slate-800 bg-slate-600">
              <img src="/favicon.ico" alt="">
            </div>
            <div class="size-8 rounded-full border-2 border-slate-800 bg-slate-500">
              <img src="/favicon.ico" alt="">
            </div>
          </div>
          <p class="text-sm">Trusted by 500+ students</p>
        </div>
      </div>
    </div>

    <!-- Right Side -->
    <div class="w-full md:w-3/5 bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center p-6 md:p-16">

      <div
        class="w-full max-w-md bg-white dark:bg-slate-900 p-8 md:p-10 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">

        <div class="mb-8 text-center">
          <h3 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-2">
            MedGyan Admin Login
          </h3>
          <p class="text-slate-500 dark:text-slate-400">
            Welcome back. Please enter your details.
          </p>
        </div>

        <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="OnSubmit()">

          <!-- Identifier -->
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">
              Username or Email
            </label>
            <input
              class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
              placeholder="Enter username or email" type="text" formControlName="identifier" />
          </div>

          <!-- Password -->
          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                Password
              </label>
            </div>

            <input
              class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
              placeholder="••••••••" type="password" formControlName="pin" />
          </div>

          <button type="submit" [disabled]="loginForm.invalid || loading" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold h-12 rounded-lg
         shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2 mt-4
         disabled:opacity-60 disabled:cursor-not-allowed">
            <span *ngIf="!loading">Login to Dashboard</span>
            <span *ngIf="loading">Logging in...</span>
          </button>

        </form>

        <div class="mt-10 text-center">
          <p class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-bold">
            Authorized personnel only
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
